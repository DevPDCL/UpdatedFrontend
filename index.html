<!-- Start of REVE Chat Script - Deferred for performance -->
<script>
  (function () {
    let loaded = false;

    function loadReveChat() {
      if (loaded) return;
      loaded = true;

      window.$_REVECHAT_API || (function (d, w) {
        var r = $_REVECHAT_API = function (c) { r._.push(c); };
        w.__revechat_account = '6395607';
        w.__revechat_version = 2;
        r._ = [];

        var rc = d.createElement('script');
        rc.async = true;
        rc.src = 'https://static.revechat.com/widget/scripts/new-livechat.js';
        d.head.appendChild(rc);
      })(document, window);
    }

    ['scroll', 'mousemove', 'touchstart', 'click'].forEach(evt => {
      window.addEventListener(evt, loadReveChat, { once: true });
    });
  })();
</script>
<!-- End of REVE Chat Script -->
